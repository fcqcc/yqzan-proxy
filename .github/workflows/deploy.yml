name: Deploy yqzan-proxy Worker

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare-proxy/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare-proxy
          # 默认就是 wrangler deploy，这里写出来更清晰
          command: deploy
          # 部署后输出
          # deploy: true / false 不用管，wrangler-action 自己处理

  # 部署后冒烟测试
  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Test proxy health
        run: |
          # 1) 主页应该返回使用说明 HTML
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://proxy.yqzan.cn/)
          if [ "$STATUS" != "200" ]; then
            echo "❌ proxy.yqzan.cn 返回 $STATUS，应该是 200"
            exit 1
          fi
          echo "✅ proxy.yqzan.cn/ → 200"

          # 2) 反代 photopea 应该返回 HTML 含 <base>
          HTML=$(curl -s "https://proxy.yqzan.cn/?d=photopea.com" | head -200)
          if echo "$HTML" | grep -q '<base href="https://proxy.yqzan.cn/?d=photopea.com">'; then
            echo "✅ 反代 photopea.com HTML 含 <base> 注入"
          else
            echo "❌ 反代 photopea.com HTML 异常"
            echo "$HTML" | head -50
            exit 1
          fi

          # 3) 白名单外的站应该返回 403
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://proxy.yqzan.cn/?d=facebook.com")
          if [ "$STATUS" != "403" ]; then
            echo "❌ facebook.com 应该 403，实际 $STATUS"
            exit 1
          fi
          echo "✅ 白名单外域名 → 403"
