name: Deploy yqzan-proxy Worker

on:
  push:
    branches: [main]
    paths:
      - '**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: .
          command: deploy

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Test proxy health
        run: |
          BASE="https://yqzan-proxy.q727705453.workers.dev"

          # 1) 主页
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $BASE/)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: $BASE/ returned $STATUS, expected 200"
            exit 1
          fi
          echo "OK: $BASE/ returns 200"

          # 2) 反代 photopea HTML 含 base
          HTML=$(curl -s "$BASE/?d=photopea.com" | head -200)
          EXPECTED_BASE="https://yqzan-proxy.q727705453.workers.dev/?d=photopea.com"
          if echo "$HTML" | grep -q "<base href=\"$EXPECTED_BASE\">"; then
            echo "OK: photopea proxy contains <base> injection"
          else
            echo "FAIL: photopea proxy HTML missing <base>"
            echo "$HTML" | head -50
            exit 1
          fi

          # 3) 白名单外
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/?d=facebook.com")
          if [ "$STATUS" != "403" ]; then
            echo "FAIL: facebook.com returned $STATUS, expected 403"
            exit 1
          fi
          echo "OK: non-whitelist domain returns 403"
