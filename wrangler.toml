name: yqzan-proxy

# Cloudflare Worker 配置
# 部署方式：GitHub Actions（自动 push 触发）
# 完整部署文档：见 cloudflare-proxy/README.md

name = "yqzan-proxy"
main = "worker.js"
compatibility_date = "2024-09-01"

# 绑自定义域名 proxy.yqzan.cn
# 首次部署后，CF 会自动加 DNS 记录 + SSL 证书
routes = [
  { pattern = "proxy.yqzan.cn/*", custom_domain = true }
]
